<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <title>Contact Form</title>
  </head>

  <body class="bg-black text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="/index.html">Nizar</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="#">Projects</a></li>
            <li class="nav-item">
              <a class="nav-link" href="./contact.html">Contact Me</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container my-5 pt-5">
      <h1 class="text-center p-4">CONTACT FORM</h1>
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6 col-lg-4">
          <div
            class="p-4 rounded-3 text-white"
            style="background-color: rgb(29, 27, 27)"
          >
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold">Name :</label>
                <input
                  type="text"
                  name="fullname"
                  class="form-control rounded"
                  placeholder="Full Name"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Email :</label>
                <input
                  type="email"
                  name="email"
                  class="form-control rounded"
                  placeholder="Your email"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Address :</label>
                <input
                  type="text"
                  name="address"
                  class="form-control rounded"
                  placeholder="Address"
                />
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Phone Number :</label>
                <input
                  class="form-control rounded"
                  type="tel"
                  name="phone"
                  inputmode="numeric"
                  placeholder="Enter 10-digit number"
                  pattern="[0-9]{10}"
                  maxlength="10"
                  required
                />
              </div>

              <button
                type="submit"
                class="btn btn-primary w-100 fw-bold rounded"
              >
                Submit
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
